# Mosquitto MQTT Broker Configuration
# Smart Cushion Fog Node – Local Broker

# ── Listener ──────────────────────────────────────────────────────────────
# Standard MQTT port (inside the Docker network)
listener 1883

# ── Security ──────────────────────────────────────────────────────────────
# NEVER allow anonymous connections.
# All clients must authenticate with a username and password.
allow_anonymous false

# Password file (generated by scripts/generate_mqtt_credentials.sh)
# DO NOT commit this file to version control; it is in .gitignore.
password_file /mosquitto/config/passwd

# ── Logging ───────────────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# ── Persistence ───────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Performance ───────────────────────────────────────────────────────────
# Maximum number of QoS 1 & 2 messages that Mosquitto will queue per client.
max_queued_messages 1000
